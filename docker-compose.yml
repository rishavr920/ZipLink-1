services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend-1:
    build: ./Backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - WORKER_ID=0  # Unique worker ID for Snowflake
    env_file:
      - .env
    depends_on:
      - redis

  backend-2:
    build: ./Backend
    ports:
      - "3001:3000" # External port 3001, internal port 3000
    environment:
      - PORT=3000
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - WORKER_ID=1  # Unique worker ID for Snowflake
    env_file:
      - .env
    depends_on:
      - redis

  frontend:
    build: ./Frontend
    ports:
      - "5173:80"
    depends_on:
      - backend-1
      - backend-2

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend-1
      - backend-2
      - frontend